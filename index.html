<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./nymbleLarge.png" type="image/png">
    <link rel="apple-touch-icon" href="./nymbleLarge.png">
    <link rel="mask-icon" href="./nymbleLarge.png " color="black">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <title>nymbleTool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="splash">
        <img src="nymbleLarge.png" alt="Loading...">
    </div>
    <div id="loginModal" style="display:none">
        <div id="loginTitle">nymbleTool</div>
        <div class="inputRow">
            <label for="inputEmail">email: </label>
            <input id="inputEmail" type="email" placeholder="email" required>
        </div>
        <div class="inputRow">
            <label for="inputPassword">password: </label>
            <input id="inputPassword" type="password" placeholder="password" required>
        </div>
        <div class="inputRow">
            <button id="loginBtn" class="button">Login</button>
        </div>
        <p id="loginError" style="color:red;"></p>
    </div>

    <div id="page" style="display:none;">
        <div id="outerDiv">
            <div id="titleDiv"></div>
            <div id="puzzleForm"></div>
            <div id="statusDiv"></div>
            <div id="logout"></div>
        </div>
    </div>

    <script src="./script.js"></script>    
</body>
</html>
